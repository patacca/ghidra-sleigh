name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build Distribution Artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Fetch submodule tags
        run: |
          git -C third_party/ghidra fetch --tags

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y zlib1g-dev

      - name: Install build tooling
        run: |
          pip install build twine

      - name: Build wheel
        run: |
          python -m build --wheel --outdir dist
        env:
          GHIDRA_SLEIGH_VERSION_SUFFIX: ${{ github.event_name == 'workflow_dispatch' && format('.dev{0}', github.run_number) || '' }}

      - name: Build sdist
        run: |
          python -m build --sdist --outdir dist
        env:
          GHIDRA_SLEIGH_VERSION_SUFFIX: ${{ github.event_name == 'workflow_dispatch' && format('.dev{0}', github.run_number) || '' }}

      - name: Validate distribution artifacts
        run: |
          twine check dist/*

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-distributions
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish to ${{ github.event_name == 'workflow_dispatch' && 'TestPyPI' || 'PyPI' }}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
    environment:
      name: ${{ github.event_name == 'workflow_dispatch' && 'testpypi' || 'pypi' }}
      url: ${{ github.event_name == 'workflow_dispatch' && 'https://test.pypi.org/project/ghidra-sleigh/' || 'https://pypi.org/project/ghidra-sleigh/' }}
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-distributions
          path: dist

      - name: Publish distribution artifacts
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          repository-url: ${{ github.event_name == 'workflow_dispatch' && 'https://test.pypi.org/legacy/' || 'https://upload.pypi.org/legacy/' }}
